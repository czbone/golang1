{{define "components-sidenav"}}
{{if .Sections}}
<aside class="hidden lg:block w-64 shrink-0 sticky top-16 h-[calc(100vh-4rem)] overflow-y-auto border-r border-gray-200 dark:border-neutral-700 bg-white dark:bg-neutral-800">
    <nav class="p-4 space-y-1">
        <p class="px-3 mb-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
            このページ内
        </p>
        {{range .Sections}}
        <a href="#{{.ID}}" 
           class="block px-3 py-2 text-sm rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-neutral-700 transition-colors">
            {{.Title}}
        </a>
        {{end}}
    </nav>
</aside>
{{end}}
{{end}}
