{{ define "header" }}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .page_title }} - {{ .app_name }}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen antialiased">

  <!-- Preline Navbar -->
  <header class="flex flex-wrap sm:justify-start sm:flex-nowrap w-full bg-white border-b border-gray-200 text-sm py-3 sticky top-0 z-50 shadow-xs">
    <nav class="max-w-5xl w-full mx-auto px-4 flex flex-wrap basis-full items-center justify-between">
      <!-- ブランドロゴ -->
      <a href="/users"
         class="flex items-center gap-x-2 text-lg font-bold text-blue-600 hover:text-blue-700 focus:outline-hidden focus:opacity-80 transition-opacity">
        <span class="material-symbols-outlined" style="font-size:32px">group</span>
        {{ .app_name }}
      </a>


    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
{{ end }}
