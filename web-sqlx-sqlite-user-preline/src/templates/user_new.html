{{ define "user_new.html" }}
{{ template "header" . }}

<div class="max-w-lg mx-auto">
  <!-- ブレッドクラム -->
  <nav class="flex items-center mb-6" aria-label="パンくずリスト">
    <ol class="flex items-center gap-x-1">
      <li class="flex items-center gap-x-1">
        <a href="/users" class="inline-flex items-center gap-x-1 text-sm text-gray-500 hover:text-blue-600 focus:outline-hidden focus:text-blue-600 transition-colors">
          <span class="material-symbols-outlined" style="font-size:16px">people</span>
          ユーザ一覧
        </a>
      </li>
      <li class="flex items-center gap-x-1 text-gray-400">
        <span class="material-symbols-outlined" style="font-size:16px">chevron_right</span>
        <span class="text-sm font-semibold text-gray-700">新規作成</span>
      </li>
    </ol>
  </nav>

  <h1 class="text-2xl font-bold text-gray-800 mb-6">ユーザ新規作成</h1>

  {{- if .errors }}
  <div class="mb-6 bg-red-50 border border-red-200 text-sm text-red-800 rounded-lg p-4" role="alert">
    <div class="flex items-start gap-x-2">
      <span class="material-symbols-outlined text-red-500 shrink-0 mt-0.5" style="font-size:18px">error</span>
      <div>
        <p class="font-semibold mb-1">入力エラー</p>
        <ul class="list-disc list-inside space-y-0.5">
          {{- range .errors }}
          <li>{{ . }}</li>
          {{- end }}
        </ul>
      </div>
    </div>
  </div>
  {{- end }}

  <!-- フォームカード -->
  <div class="bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden">
    <!-- カードヘッダ -->
    <div class="px-6 py-4 border-b border-gray-200">
      <h2 class="text-sm font-semibold text-gray-800">ユーザ情報</h2>
      <p class="text-xs text-gray-500 mt-0.5">必須項目（<span class="text-red-500">*</span>）をすべて入力してください。</p>
    </div>
    <!-- カードボディ -->
    <div class="px-6 py-5">
      <form method="POST" action="/users" novalidate>
        <!-- 名前 -->
        <div class="mb-5">
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1.5">
            名前 <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="name"
            name="name"
            value="{{ if .input }}{{ index .input "name" }}{{ end }}"
            placeholder="例: 山田 太郎"
            class="py-2.5 px-4 block w-full border border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none"
          />
        </div>

        <!-- メールアドレス -->
        <div class="mb-6">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">
            メールアドレス <span class="text-red-500">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            value="{{ if .input }}{{ index .input "email" }}{{ end }}"
            placeholder="例: taro@example.com"
            class="py-2.5 px-4 block w-full border border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none"
          />
        </div>

        <!-- ボタン -->
        <div class="flex items-center gap-x-3">
          <button type="submit"
                  class="py-2 px-4 inline-flex items-center gap-x-1.5 text-sm font-semibold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800 focus:outline-hidden focus:bg-blue-700 transition-colors">
            <span class="material-symbols-outlined" style="font-size:16px">check</span> 登録する
          </button>
          <a href="/users"
             class="py-2 px-4 inline-flex items-center gap-x-1.5 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-50 focus:outline-hidden focus:bg-gray-50 transition-colors">
            キャンセル
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{{ template "footer" . }}
{{ end }}
