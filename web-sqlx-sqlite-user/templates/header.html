{{ define "header" }}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .page_title }} - {{ .app_name }}</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/users" class="text-xl font-bold text-blue-600 hover:text-blue-800 tracking-tight">
        {{ .app_name }}
      </a>
      <div class="flex gap-4">
        <a href="/users" class="text-sm text-gray-600 hover:text-blue-600 font-medium">ユーザ一覧</a>
        <a href="/users/new" class="text-sm text-gray-600 hover:text-blue-600 font-medium">新規作成</a>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-8">
{{ end }}
