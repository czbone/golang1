{{ define "user_edit.html" }}
{{ template "header" . }}

<div class="max-w-lg mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/users" class="text-gray-400 hover:text-gray-600 text-sm">← 一覧へ戻る</a>
  </div>

  <h1 class="text-2xl font-bold text-gray-800 mb-6">ユーザ編集</h1>

  {{- if .errors }}
  <div class="mb-6 rounded-lg bg-red-50 border border-red-200 px-4 py-3">
    <p class="text-sm font-semibold text-red-700 mb-1">入力エラー</p>
    <ul class="list-disc list-inside space-y-1">
      {{- range .errors }}
      <li class="text-sm text-red-600">{{ . }}</li>
      {{- end }}
    </ul>
  </div>
  {{- end }}

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 mb-4">
    <form method="POST" action="/users/{{ index .user "id" }}" novalidate>
      <div class="mb-5">
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
          名前 <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          id="name"
          name="name"
          value="{{ index .user "name" }}"
          placeholder="例: 山田 太郎"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <div class="mb-6">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          メールアドレス <span class="text-red-500">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{ index .user "email" }}"
          placeholder="例: taro@example.com"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        />
      </div>

      <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
          更新する
        </button>
        <a href="/users"
           class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2 rounded-lg border border-gray-200 hover:border-gray-300 transition-colors">
          キャンセル
        </a>
      </div>
    </form>
  </div>

  <div class="bg-white rounded-xl border border-red-100 shadow-sm p-5">
    <h2 class="text-sm font-semibold text-red-600 mb-3">危険な操作</h2>
    <div class="flex items-center justify-between">
      <p class="text-sm text-gray-500">このユーザを完全に削除します。この操作は取り消せません。</p>
      <form method="POST" action="/users/{{ index .user "id" }}/delete"
            onsubmit="return confirm('「{{ index .user "name" }}」を削除しますか？この操作は取り消せません。');">
        <button type="submit"
                class="ml-4 bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors whitespace-nowrap">
          削除する
        </button>
      </form>
    </div>
  </div>

  <p class="mt-4 text-xs text-gray-400">
    登録日時: {{ index .user "created_at" }}
  </p>
</div>

{{ template "footer" . }}
{{ end }}
